<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhijeet Goswami - Contact Form</title>
</head>
<body>

    <h2>Collaboration Contact Form</h2>
    <p>The contact section helps people connect with me easily for any opportunities or communication.</p>
    
    <form action="#" method="POST">
        <label for="studentName">Your Full Name:</label><br>
        <input type="text" id="studentName" name="studentName" required><br><br>

        <label for="studentEmail">Your Email Address:</label><br>
        <input type="email" id="studentEmail" name="studentEmail" required><br><br>

        <label>Primary Technical Track Interest:</label><br>
        <input type="radio" id="dsTrack" name="trackInterest" value="Data Science">
        <label for="dsTrack">Data Science Student Track </label><br>
        <input type="radio" id="peTrack" name="trackInterest" value="Prompt Engineering">
        <label for="peTrack">Prompt Engineering (PE44) Track </label><br><br>

        <label>Select Tools for Collaborative Workspace:</label><br>
        <input type="checkbox" id="toolPython" name="tools" value="Python">
        <label for="toolPython">Python Platform Automation</label><br>
        <input type="checkbox" id="toolOllama" name="tools" value="Ollama">
        <label for="toolOllama">Ollama Local LLM Framework </label><br><br>

        <input type="submit" value="Submit Verification Data">
    </form>

</body>
</html>
